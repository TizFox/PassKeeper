<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pass Keeper</title>
		<link rel="icon" href="./assets/iconLight.png" />

		<!-- Bootstrap -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
			integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
			crossorigin="anonymous"
		/>
		<script
			src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
			integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
			crossorigin="anonymous"
		></script>

		<!-- Google Font -->
		<link
			href="https://fonts.googleapis.com/css?family=Fira Code"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@600&display=swap"
			rel="stylesheet"
		/>

		<!-- Font Awesome -->
		<script
			src="https://kit.fontawesome.com/ba06ebf7f1.js"
			crossorigin="anonymous"
		></script>

		<!-- My Stuff -->
		<link rel="stylesheet" type="text/css" href="./styles.css" />
		<script src="./script.js"></script>
	</head>
	<body>
		<img id="logo" src="./assets/logo.png" />

		<nav class="container-fluid">
			<div class="row">
				<div class="col-lg-4"></div>
				<div class="col-lg-4 col-md-12 col-sm-12">
					<div class="input-group">
						<div class="input-group-prepend">
							<button
								class="btn btn-warning"
								type="button"
								onclick="resetKey()"
							>
								Reset
							</button>
						</div>
						<input
							id="key"
							type="text"
							class="form-control"
							placeholder="Key"
							aria-label="Key"
						/>
						<div class="input-group-append">
							<button
								class="btn btn-danger"
								type="button"
								onclick="setKey()"
							>
								Set
							</button>
						</div>
					</div>
				</div>
				<div class="col-lg-4">
					<button
						id="clear"
						type="button"
						class="btn btn-light debug"
						onclick="clearStorage()"
					>
						Clear [DEBUG]
					</button>
				</div>
			</div>
		</nav>

		<div class="spacer"></div>

		<div class="container-fluid">
			<div class="row">
				<!-- Insert Div -->
				<div class="col-lg-6 col-md-12 col-sm-12">
					<div class="card">
						<div class="card-header main"><h2>Insert</h2></div>
						<div class="card-body">
							<table id="formTable">
								<tr>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"
												>Name</span
											>
										</div>
										<input
											id="name"
											type="text"
											class="form-control"
											placeholder="Name"
											aria-label="Name"
										/>
									</div>
								</tr>
								<tr>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"
												>User</span
											>
										</div>
										<input
											id="user"
											type="text"
											class="form-control"
											placeholder="User"
											aria-label="User"
										/>
									</div>
								</tr>
								<tr>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"
												>Email</span
											>
										</div>
										<input
											id="email"
											type="text"
											class="form-control"
											placeholder="Email"
											aria-label="Email"
										/>
									</div>
								</tr>
								<tr>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"
												>Password</span
											>
										</div>
										<input
											id="password"
											type="text"
											class="form-control"
											placeholder="Password"
											aria-label="Password"
										/>
										<div class="input-group-append">
											<button
												class="btn btn-secondary"
												type="button"
												onclick="generate('password')"
											>
												Generate
											</button>
										</div>
									</div>
								</tr>
								<tr>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"
												>Other</span
											>
										</div>
										<textarea
											id="other"
											type="text"
											class="form-control"
											placeholder="Other Info"
											aria-label="Other Info"
										></textarea>
									</div>
								</tr>
							</table>
							<button
								type="button"
								class="btn btn-light debug"
								onclick="fillData()"
							>
								Fill [DEBUG]
							</button>
						</div>
						<div class="card-footer main">
							<button
								type="button"
								class="btn btn-block btn-success"
								onclick="getData()"
							>
								--> Submit <--
							</button>
							<button
								type="button"
								class="btn btn-block btn-info"
								onclick="clearData()"
							>
								Clear
							</button>
						</div>
					</div>
				</div>
				<!-- Find Div -->
				<div class="col-lg-6 col-md-12 col-sm-12">
					<div class="card">
						<div class="card-header main"><h2>Find</h2></div>
						<div class="card-body">
							<div class="input-group">
								<div class="input-group-prepend">
									<button
										class="btn btn-info"
										type="button"
										onclick="clearFind()"
									>
										Clear
									</button>
								</div>
								<input
									id="searchName"
									type="text"
									class="form-control"
									placeholder="Search by Name"
									aria-label="Search by Name"
								/>
								<div class="input-group-append">
									<button
										class="btn btn-dark"
										type="button"
										onclick="updateAndFind(true)"
									>
										<i
											class="fa-solid fa-magnifying-glass"
										></i>
									</button>
								</div>
							</div>

							<div id="modTableDiv">
								<div class="spacer"></div>
								<table id="formTable">
									<tr>
										<div class="input-group">
											<div class="input-group-prepend">
												<span class="input-group-text"
													>Name</span
												>
											</div>
											<input
												id="newName"
												type="text"
												class="form-control"
												placeholder="Name"
												aria-label="Name"
											/>
										</div>
									</tr>
									<tr>
										<div class="input-group">
											<div class="input-group-prepend">
												<span class="input-group-text"
													>User</span
												>
											</div>
											<input
												id="newUser"
												type="text"
												class="form-control"
												placeholder="User"
												aria-label="User"
											/>
										</div>
									</tr>
									<tr>
										<div class="input-group">
											<div class="input-group-prepend">
												<span class="input-group-text"
													>Email</span
												>
											</div>
											<input
												id="newEmail"
												type="text"
												class="form-control"
												placeholder="Email"
												aria-label="Email"
											/>
										</div>
									</tr>
									<tr>
										<div class="input-group">
											<div class="input-group-prepend">
												<span class="input-group-text"
													>Password</span
												>
											</div>
											<input
												id="newPassword"
												type="text"
												class="form-control"
												placeholder="Password"
												aria-label="Password"
											/>
											<div class="input-group-append">
												<button
													class="btn btn-secondary"
													type="button"
													onclick="
														generate('newPassword')
													"
												>
													Generate
												</button>
											</div>
										</div>
									</tr>
									<tr>
										<div class="input-group">
											<div class="input-group-prepend">
												<span class="input-group-text"
													>Other</span
												>
											</div>
											<textarea
												id="newOther"
												type="text"
												class="form-control"
												placeholder="Other Info"
												aria-label="Other Info"
											></textarea>
										</div>
									</tr>
								</table>
								<div class="row">
									<div class="col-lg6 col-md-6 col-sm-12">
										<button
											type="button"
											class="btn btn-block btn-success"
											onclick="modifyData(true)"
										>
											Submit
										</button>
									</div>
									<div class="col-lg6 col-md-6 col-sm-12">
										<button
											type="button"
											class="btn btn-block btn-dark"
											onclick="modifyData(false)"
										>
											Cancel
										</button>
									</div>
								</div>
							</div>

							<div id="findList" class="list">
								<ul class="list-group list-group-horizontal">
									<li class="list-group-item listItem main">
										<b>Name</b>
									</li>
									<li class="list-group-item listItem main">
										<b>User / Email</b>
									</li>
									<li class="list-group-item listItem main">
										<b>Actions</b>
									</li>
								</ul>
							</div>
						</div>
						<div class="card-footer main"></div>
					</div>
				</div>
				<!------------------------------->
			</div>
		</div>

		<table id="alertTable">
			<tr>
				<th>
					<div
						id="successAlert"
						class="alert alert-success"
						role="alert"
					></div>
				</th>
			</tr>
			<tr>
				<th>
					<div
						id="warningAlert"
						class="alert alert-warning"
						role="alert"
					></div>
				</th>
			</tr>
			<tr>
				<th>
					<div
						id="dangerAlert"
						class="alert alert-danger"
						role="alert"
					></div>
				</th>
			</tr>
		</table>
	</body>
</html>
