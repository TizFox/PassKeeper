<section class="bars-container">
	<header class="header">
		<app-logo />

		<div class="flex-grow"></div>

		@if (supabase.loading()) {
			<app-loading w="w-min" />
		} @else {
			@if (supabase.user) {
				<app-button href="/vault">
					VAULT
				</app-button>
				<app-avatar />
			} @else {
				<app-button href="/auth">
					LOGIN
				</app-button>
			}
		}
	</header>
</section>
