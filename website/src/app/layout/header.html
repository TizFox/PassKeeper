<section class="bars-container">
	<header class="header">
		<app-logo />

		<div class="flex-grow"></div>

		@if (setup()) {
			<app-loading w="w-min" />
		} @else {
			@if (user()) {
				<app-button href="/vault">
					VAULT
				</app-button>
				<a routerLink="/profile">
					<app-avatar />
				</a>
			} @else {
				<app-button href="/auth">
					LOGIN
				</app-button>
			}
		}
	</header>
</section>
