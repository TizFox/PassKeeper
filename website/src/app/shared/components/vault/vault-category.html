<div
	class="p-3 relative
	flex flex-row justify-start items-center gap-3
	container-rounded"
>
	<app-category-icon [category]="category()" simple />
	<h2 [class]="'flex-1 ' + (category().name !== '' ? 'truncate' : 'text-pla')">
		{{ category().name !== '' ? category().name : 'Category Name' }}
	</h2>

	<a
		(click)="onClick.emit()"
		class="absolute top-0 left-0 bottom-0 right-0
		container-rounded border-2
		color-transition border-pla hover:border-cta"
	>
	</a>
</div>
