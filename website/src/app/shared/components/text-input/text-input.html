<div class="relative flex gap-3">
	<input
		[type]="type() !== 'password' ? type() : (obscured() ? type() : 'text')"
		[placeholder]="placeholder()"
		[required]="required()"
		[disabled]="disabled()"
		[value]="value()"
		(input) ="onInput($event)"
		(blur)="onBlur()"
		[class]="'peer flex-1 pl-7
		placeholder-pla
		border-y-2 border-t-transparent border-b-pla
		rounded-xs
		color-transition
		focus:border-b-cta
		user-invalid:border-b-err ' + (invalidIf() ? 'border-b-err' : '')"
	/>
	<div
		[class]="'absolute left-0 h-full
		text-pla
		color-transition
		peer-focus:text-cta
		peer-user-invalid:text-err ' + (invalidIf() ? 'text-err' : '')"
	>
		<svg [lucideIcon]="icon()"></svg>
	</div>

	@if (type() === "password") {
		<button
			type="button"
			(mousedown)="$event.preventDefault()"
			(click)="toggleObscured()"
			class="absolute right-0 text-pla cursor-pointer"
		>
			<svg [lucideIcon]="passIcon()"></svg>
		</button>
	}
</div>
