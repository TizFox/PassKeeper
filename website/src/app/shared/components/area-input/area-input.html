<textarea
	[placeholder]="placeholder()"
	[required]="required()"
	[disabled]="disabled()"
	[value]="value()"
	(input) ="onInput($event)"
	(blur)="onBlur()"
	class="flex-1 w-full
	field-sizing-content resize-none
	placeholder-pla
	border-b-2 border-pla
	rounded-xs
	color-transition
	focus:border-cta
	user-invalid:border-err"
>
</textarea>
