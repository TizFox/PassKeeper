<div [class]="extra() + ' flex items-center gap-1'">
	@if (label() !== '') {
		<label>{{ label() }}:</label>
	}
	<select
		[formField]="field"
		class="flex-1 w-full min-w-0 input-h
		border-y-2 border-t-transparent border-b-mid
		base-rounded
		color-transition
		focus:border-b-cta">
		@for (opt of optionList(); track opt) {
			<option [value]="opt" [selected]="opt === field().value()">{{ opt | dashtotitle }}</option>
		}
	</select>
</div>
