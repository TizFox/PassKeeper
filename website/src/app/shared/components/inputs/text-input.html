<div [class]="extra() + ' relative flex'">
	<input
		[type]="inputType()"
		[placeholder]="placeholder()"
		[required]="required()"
		[disabled]="disabled()"
		[value]="value()"
		(input) ="onInput($event)"
		(blur)="onBlur()"
		class="peer flex-1 w-full input-h pl-7
		placeholder-pla
		border-y-2 border-t-transparent border-b-pla
		base-rounded
		color-transition
		focus:border-b-cta
		user-invalid:border-b-err"
	/>

	<div
		class="absolute left-0 top-1/2 -translate-y-[50%]
		text-pla color-transition
		peer-focus:text-cta
		peer-user-invalid:text-err"
	>
		<svg [lucideIcon]="icon()"></svg>
	</div>

	@if (type() === "password") {
		<button
			type="button"
			(mousedown)="$event.preventDefault()"
			(click)="toggleObscured()"
			class="absolute right-0 top-1/2 -translate-y-[50%]
			text-pla cursor-pointer color-transition
			peer-focus:text-cta
			peer-user-invalid:text-err"
		>
			<svg [lucideIcon]="passIcon()"></svg>
		</button>
	}
</div>
