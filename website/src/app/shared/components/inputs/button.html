<button
	[type]="type()"
	(click)="handleClick($event)"
	[routerLink]="href()"
	[disabled]="disabled()"
	[class]="extra() + ' ' + p() + ' input-h base-rounded cursor-pointer
	border-2 border-mid text-mid
	color-transition
	hover:bg-cta hover:border-cta hover:text-inv
	disabled:bg-transparent disabled:border-error disabled:text-std disabled:cursor-not-allowed'"
>
	<ng-content />
</button>
