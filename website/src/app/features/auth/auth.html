@if (setup()) {
	<app-loading msg="Loading..." />
} @else {
	<section class="w-full grid grid-cols-2 auto-row-fr">
		<!-- LOGIN -->
		<app-container [extra]="translateLogin()">
			<form
				[formRoot]="loginForm"
				(submit)="handler($event, 'login')"
				class="flex flex-col gap-3"
			>
				<h1 class="w-full text-center">LOGIN</h1>

				<app-text-input type="email" placeholder="Email" required [formField]="loginForm.email" />
				<app-text-input type="password" placeholder="Password" required [formField]="loginForm.password" />
				<div class="invisible"><app-text-input /></div>

				<div class="w-full flex justify-between items-end">
					<a (click)="switchForm()" class="link">Create an account?</a>
					<app-button type="submit" [disabled]="loading()">{{ loading() ? 'Loading...' : 'Confirm' }}</app-button>
				</div>
			</form>
		</app-container>

		<!-- SIGNUP -->
		<app-container [extra]="translateSignup()">
			<form
				[formRoot]="signupForm"
				(submit)="handler($event, 'signup')"
				class="flex flex-col gap-3"
			>
				<h1 class="w-full text-center">SIGNUP</h1>

				<app-text-input placeholder="Username" required [formField]="signupForm.username" />
				<app-text-input type="email" placeholder="Email" required [formField]="signupForm.email" />
				<app-text-input type="password" placeholder="Password" required [formField]="signupForm.password" />

				<div class="w-full flex justify-between items-end">
					<a (click)="switchForm()" class="link">Have an account?</a>
					<app-button type="submit" [disabled]="loading()">{{ loading() ? 'Loading...' : 'Confirm' }}</app-button>
				</div>
			</form>
		</app-container>
	</section>
}
