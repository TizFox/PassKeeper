@if (supabase.loading()) {
	<app-loading msg="Loading..." />
} @else {
	<section class="w-full grid grid-cols-2 auto-row-fr">
		<!-- LOGIN -->
		<app-container [extra]="translateLogin()">
			<form
				[formGroup]="loginForm"
				(ngSubmit)="handler($event, 'login')"
				class="flex flex-col gap-3"
			>
				<h1 class="w-full text-center">LOGIN</h1>

				<app-text-input type="email" placeholder="Email" required formControlName="email" />
				<app-text-input type="password" placeholder="Password" required formControlName="password" />
				<div class="invisible"><app-text-input /></div>

				<div class="w-full flex justify-between items-end">
					<a (click)="switchForm()" class="link">Create an account?</a>
					<app-button type="submit">Confirm</app-button>
				</div>
			</form>
		</app-container>

		<!-- SIGNUP -->
		<app-container [extra]="translateSignup()">
			<form
				[formGroup]="signupForm"
				(ngSubmit)="handler($event, 'signup')"
				class="flex flex-col gap-3"
			>
				<h1 class="w-full text-center">SIGNUP</h1>

				<app-text-input placeholder="Username" required formControlName="username" />
				<app-text-input type="email" placeholder="Email" required formControlName="email" />
				<app-text-input type="password" placeholder="Password" required formControlName="password" />

				<div class="w-full flex justify-between items-end">
					<a (click)="switchForm()" class="link">Have an account?</a>
					<app-button type="submit">Confirm</app-button>
				</div>
			</form>
		</app-container>
	</section>
}
