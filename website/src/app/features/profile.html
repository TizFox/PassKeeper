@if (setup()) {
	<app-loading msg="Checking your Account..." />
} @else {
	<app-container extra="w-min mx-auto gap-5">
		<div class="w-full flex items-center gap-3">
			<app-avatar noHover />
			<div class="flex flex-col">
				<h2 class="font-semibold text-cta">{{ profile().username }}</h2>
				<span>{{ profile().email }} </span>
				{{ profile().createdAt }}
			</div>
		</div>

		<form [formRoot]="profileForm" class="w-full flex flex-col gap-3">
			<app-text-input placeholder="New Username" [field]="profileForm.newUsername()" />
			<app-text-input type="password" placeholder="New Password" notObscured [field]="profileForm.newPassword()" />

			<app-button (onClick)="handler('update')" [disabled]="loading()" extra="w-full">
				{{loading() ? 'Loading...' : 'UPDATE'}}
			</app-button>

			<div class="w-full flex gap-3">
				<app-button	(onClick)="handler('logout')" [disabled]="loading()" extra="w-full">
					{{loading() ? 'Loading...' : 'LOGOUT'}}
				</app-button>

				<app-button (onClick)="showConfirmDelete.set(true)" [disabled]="loading()" extra="w-full">
					{{loading() ? 'Loading...' : 'DELETE'}}
				</app-button>
			</div>
		</form>
	</app-container>

	@if (showConfirmDelete()) {
		<app-confirm title="Delete Account?" message="If you are sure type: 'I want to delete my account'." checkText="I want to delete my account" (close)="handler('delete', $event)" />
	}
}
